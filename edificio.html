<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Concejo Municipal de Nosara — Tour Virtual 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a1a1f;font-family:Inter,system-ui,sans-serif;color:#fff}
#app{position:fixed;inset:0;z-index:2}canvas{display:block}

/* ---------- Loading ---------- */
#loading{position:fixed;inset:0;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;z-index:30;background:#0a1a1f}
#loading .spin{width:40px;height:40px;border:3px solid rgba(26,163,176,.2);border-top-color:#1AA3B0;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading span{color:#1AA3B0;font-size:14px}

/* ---------- Start screen ---------- */
#start{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(160deg,#071518 0%,#0d2a30 40%,#0a1a1f 100%);z-index:20;text-align:center;padding:24px;transition:opacity .5s}
#start .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(26,163,176,.12);border:1px solid rgba(26,163,176,.25);border-radius:20px;padding:5px 14px;font-size:12px;color:#1AA3B0;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
#start h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;max-width:560px}
#start h1 .tl{color:#1AA3B0} #start h1 .gd{color:#E8A82C}
#start p{color:#8ca8b0;max-width:460px;line-height:1.65;font-size:14px}
#start .highlight{color:#EDF7F9;font-weight:600}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.btn-main{padding:14px 30px;font-size:15px;font-weight:700;border:none;border-radius:40px;cursor:pointer;
  background:linear-gradient(135deg,#1AA3B0,#0E6E7C);color:#fff;box-shadow:0 6px 28px rgba(26,163,176,.35);transition:transform .15s,box-shadow .15s}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(26,163,176,.45)}
.btn-ar{padding:14px 30px;font-size:15px;font-weight:700;border:2px solid rgba(232,168,44,.5);border-radius:40px;cursor:pointer;
  background:rgba(232,168,44,.08);color:#E8A82C;transition:transform .15s,background .15s}
.btn-ar:hover{transform:translateY(-2px);background:rgba(232,168,44,.15)}
.keys{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.key{background:rgba(14,110,124,.12);border:1px solid rgba(26,163,176,.2);border-radius:6px;padding:4px 10px;font-size:11px;color:#7ec8d0}
#start .foot{margin-top:8px;font-size:11px;color:#4a6a72}

/* ---------- Language toggle ---------- */
#lang{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:22;display:flex;background:rgba(10,26,31,.85);
  border:1px solid rgba(26,163,176,.3);border-radius:20px;overflow:hidden;backdrop-filter:blur(8px);font-weight:700;font-size:13px}
#lang button{border:none;background:none;color:#7ec8d0;padding:7px 16px;cursor:pointer;transition:all .2s}
#lang button.on{background:#1AA3B0;color:#fff}

/* ---------- HUD ---------- */
#cross{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px;border-radius:50%;background:rgba(255,255,255,.8);
  box-shadow:0 0 0 1px rgba(0,0,0,.3),0 0 8px rgba(26,163,176,.4);z-index:10;pointer-events:none;display:none}
#tag{position:fixed;top:56px;left:14px;z-index:10;font-size:12px;font-weight:600;color:#1AA3B0;
  background:rgba(10,26,31,.75);padding:6px 14px;border-radius:20px;backdrop-filter:blur(8px);border:1px solid rgba(26,163,176,.15);display:none}
#hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:10;background:rgba(10,26,31,.75);padding:7px 16px;
  border-radius:20px;font-size:12px;color:#7ec8d0;backdrop-filter:blur(8px);pointer-events:none;display:none;white-space:nowrap;border:1px solid rgba(26,163,176,.1)}

/* ---------- Tour waypoints ---------- */
#waypoints{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:11;display:none;gap:6px;flex-wrap:wrap;justify-content:center;max-width:95vw}
.wp{padding:6px 13px;font-size:12px;font-weight:600;border:1px solid rgba(26,163,176,.25);border-radius:16px;cursor:pointer;
  background:rgba(10,26,31,.8);color:#7ec8d0;backdrop-filter:blur(6px);transition:all .2s;white-space:nowrap}
.wp:hover,.wp.active{background:rgba(26,163,176,.2);color:#fff;border-color:rgba(26,163,176,.5)}
.wp.visited{border-color:rgba(232,168,44,.3);color:#E8A82C}

/* ---------- Info card ---------- */
#info{position:fixed;top:50%;right:18px;transform:translateY(-50%);z-index:12;max-width:290px;padding:18px;border-radius:16px;
  background:rgba(10,26,31,.9);backdrop-filter:blur(12px);border:1px solid rgba(26,163,176,.2);
  opacity:0;pointer-events:none;transition:opacity .35s}
#info.show{opacity:1;pointer-events:auto}
#info h3{font-size:15px;color:#1AA3B0;margin-bottom:6px;font-weight:700}
#info p{font-size:13px;color:#a0bfc6;line-height:1.55}
#info .close-info{position:absolute;top:8px;right:10px;background:none;border:none;color:#5a7a82;cursor:pointer;font-size:16px}

/* ---------- Link prompt ---------- */
#linkBtn{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:13;display:none;align-items:center;gap:8px;
  padding:11px 20px;border-radius:24px;border:1px solid rgba(232,168,44,.5);background:rgba(10,26,31,.92);
  color:#E8A82C;font-weight:700;font-size:14px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
#linkBtn .kbd{font-size:11px;background:rgba(232,168,44,.15);border:1px solid rgba(232,168,44,.35);border-radius:5px;padding:2px 6px}

/* ---------- Minimap ---------- */
#minimap{position:fixed;top:14px;right:14px;z-index:10;width:130px;height:130px;border-radius:12px;
  background:rgba(10,26,31,.8);border:1px solid rgba(26,163,176,.2);backdrop-filter:blur(6px);display:none;overflow:hidden}
#minimap canvas{width:100%;height:100%}

/* ---------- AR ---------- */
#ar-video{position:fixed;inset:0;z-index:1;object-fit:cover;display:none;width:100%;height:100%}
#ar-close{position:fixed;top:14px;left:14px;z-index:16;padding:10px 20px;font-size:14px;font-weight:700;border:none;border-radius:20px;
  cursor:pointer;background:rgba(10,26,31,.85);color:#1AA3B0;border:1px solid rgba(26,163,176,.3);pointer-events:auto;display:none}
#ar-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:16;background:rgba(10,26,31,.8);padding:8px 18px;
  border-radius:20px;font-size:12px;color:#7ec8d0;pointer-events:none;display:none}

/* ---------- AR guide overlay ---------- */
#arx-guide{position:fixed;inset:0;z-index:21;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(7,21,24,.96);text-align:center;padding:28px}
#arx-guide h2{font-size:22px;font-weight:800;color:#E8A82C}
#arx-guide .steps{display:flex;flex-direction:column;gap:12px;max-width:340px;text-align:left}
#arx-guide .st{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:#bfe0e6;line-height:1.5}
#arx-guide .st .n{flex:0 0 26px;height:26px;border-radius:50%;background:rgba(232,168,44,.15);border:1px solid rgba(232,168,44,.4);
  color:#E8A82C;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
#arx-guide .go{margin-top:8px;padding:15px 38px;font-size:16px;font-weight:800;border:none;border-radius:40px;cursor:pointer;
  background:linear-gradient(135deg,#E8A82C,#c98d1a);color:#1a1206;box-shadow:0 6px 28px rgba(232,168,44,.35)}
#arx-guide .back{background:none;border:none;color:#5a7a82;font-size:13px;cursor:pointer;margin-top:2px;text-decoration:underline}

/* ---------- Touch controls ---------- */
#joy{position:fixed;left:22px;bottom:22px;width:110px;height:110px;border-radius:50%;z-index:15;
  background:rgba(26,163,176,.08);border:2px solid rgba(26,163,176,.25);display:none;touch-action:none}
#stick{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px;border-radius:50%;
  background:rgba(26,163,176,.7);box-shadow:0 3px 12px rgba(0,0,0,.3)}
#jump{position:fixed;right:24px;bottom:34px;width:76px;height:76px;border-radius:50%;z-index:15;display:none;
  background:rgba(232,168,44,.15);border:2px solid rgba(232,168,44,.4);color:#E8A82C;font-weight:700;font-size:13px;touch-action:none}

@media(max-width:500px){
  #info{right:10px;left:10px;max-width:none;top:auto;bottom:120px;transform:none}
  #minimap{width:96px;height:96px}
}

/* ---------- clean mobile HUD ---------- */
.touch #minimap,.touch #jump,.touch #tag{display:none !important}
.touch .wp{padding:4px 11px;font-size:11px}
.touch #waypoints{bottom:42px;gap:5px;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;
  max-width:94vw;padding:3px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.touch #waypoints::-webkit-scrollbar{display:none}
.touch #hint{font-size:11px;bottom:12px}
.touch #info{font-size:12px}

/* rotate-to-landscape tip (portrait phones only) */
#rot-tip{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:12;display:none;align-items:center;gap:8px;
  background:rgba(10,26,31,.88);border:1px solid rgba(232,168,44,.45);color:#E8A82C;padding:9px 18px;border-radius:22px;
  font-size:12.5px;font-weight:700;white-space:nowrap;backdrop-filter:blur(8px)}
@media(orientation:landscape){#rot-tip{display:none !important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="cross"></div>
<div id="lang"><button id="es" class="on">ES</button><button id="en">EN</button></div>
<div id="tag"></div>
<div id="hint"></div>
<div id="waypoints"></div>
<div id="info"><button class="close-info" onclick="hideInfo()">&times;</button><h3 id="info-t"></h3><p id="info-p"></p></div>
<button id="linkBtn"><span id="linkTxt"></span><span class="kbd" id="linkKbd">E</span></button>
<div id="minimap"><canvas id="mmc" width="300" height="300"></canvas></div>
<div id="joy"><div id="stick"></div></div>
<button id="jump"></button>
<div id="rot-tip">📱 <span id="rot-txt"></span></div>
<div id="arx-guide">
  <h2 id="axg-t"></h2>
  <div class="steps">
    <div class="st"><span class="n">1</span><span id="axg-1"></span></div>
    <div class="st"><span class="n">2</span><span id="axg-2"></span></div>
    <div class="st"><span class="n">3</span><span id="axg-3"></span></div>
  </div>
  <button class="go" id="axg-go"></button>
  <button class="back" id="axg-back"></button>
</div>
<video id="ar-video" playsinline autoplay muted></video>
<button id="ar-close"></button>
<div id="ar-hint"></div>

<div id="loading"><div class="spin"></div><span>Construyendo el Concejo...</span></div>

<div id="start">
  <div class="badge">Nosara 2026</div>
  <h1><span class="tl">Concejo Municipal</span><br>de <span class="gd">Nosara</span></h1>
  <p id="s-intro"></p>
  <div class="btns">
    <button class="btn-main" id="enter"></button>
    <button class="btn-ar" id="enter-guided" style="border-color:rgba(26,163,176,.5);color:#7ec8d0"></button>
    <button class="btn-ar" id="enter-arx"></button>
    <button class="btn-ar" id="enter-ar" style="display:none"></button>
  </div>
  <div class="keys" id="kd"><span class="key" id="k-move"></span><span class="key" id="k-look"></span><span class="key" id="k-jump"></span><span class="key" id="k-run"></span></div>
  <div class="keys" id="km" style="display:none"><span class="key" id="k-mtouch"></span><span class="key" id="k-ltouch"></span></div>
  <p class="foot" id="s-foot"></p>
</div>

<script>
// surface any startup error on the loading screen (mobile diagnosis)
window.addEventListener('error',e=>{const L=document.getElementById('loading');
  if(L&&L.style.display!=='none'){const s=L.querySelector('span');if(s)s.textContent='Error: '+(e.message||'desconocido');}});
</script>
<script type="module">
// direct URL import (no importmap) → works on older mobile Safari/Chrome
import*as THREE from'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const isTouch=matchMedia('(pointer:coarse)').matches||'ontouchstart'in window||location.search.includes('touch=1');
if(isTouch)document.body.classList.add('touch');
const app=document.getElementById('app');
let lang='es';
const SITE='https://muninosara.org';

// ============================================================
// I18N REGISTRY (3D labels + screens redraw on language switch)
// ============================================================
const i18nReg=[];
function reg(fn){fn(lang);i18nReg.push(fn);}
function tr(o){return (o&&o[lang])||(o&&o.es)||o;}

// ============================================================
// RENDERER / SCENE / CAMERA
// ============================================================
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xc8e6f0);
scene.fog=new THREE.FogExp2(0xc8e6f0,0.009);

const camera=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,0.05,300);
camera.rotation.order='YXZ';
const EYE=1.62;
const pos=new THREE.Vector3(0,EYE,isTouch?25:17);   // phones start farther back: see the whole building + learn controls
let yaw=0,pitch=0;          // yaw=0 looks -Z (north), into the building
let vy=0,onGround=true;     // vertical velocity for jumping
const GRAV=-19,JUMP=6.4;

// ============================================================
// NOSARA PALETTE
// ============================================================
const PAL={teal:0x0E6E7C,ocean:0x1AA3B0,bosque:0x2F6B4F,crema:0xEDF7F9,gold:0xE8A82C,
  warmW:0xF5EDE0,wood:0xB8935A,woodD:0x7A5C35,concrete:0xD8CFC4,stone:0xBAB0A4,
  glass:0xBFE8EE,steel:0x94A8B4,sky:0xc8e6f0,grass:0x5DAA68,darkG:0x2F6B4F};

const mk=(c,o={})=>new THREE.MeshStandardMaterial({color:c,roughness:.8,...o});
const M={
  floor:mk(PAL.warmW,{roughness:.92}),floorStone:mk(PAL.stone,{roughness:.95}),
  floorWood:mk(PAL.wood,{roughness:.75}),
  wall:mk(PAL.crema,{roughness:.95}),wallAcc:mk(PAL.teal,{roughness:.7}),
  ceil:mk(0xfafcfd,{roughness:1}),
  wood:mk(PAL.wood,{roughness:.6}),woodD:mk(PAL.woodD,{roughness:.65}),
  metal:mk(PAL.steel,{roughness:.35,metalness:.5}),dark:mk(0x2d3a42),
  frameGlow:mk(PAL.ocean,{emissive:PAL.ocean,emissiveIntensity:.7,roughness:.4}),
  teal:mk(PAL.teal,{roughness:.55}),ocean:mk(PAL.ocean,{roughness:.55}),
  gold:mk(PAL.gold,{roughness:.5}),
  glass:mk(PAL.glass,{transparent:true,opacity:.16,roughness:.08,side:THREE.DoubleSide}),
  glassWall:mk(PAL.glass,{transparent:true,opacity:.22,roughness:.05,side:THREE.DoubleSide}),
  panel:mk(0xffffff,{emissive:0xffffff,emissiveIntensity:.5}),
  pot:mk(0xBB7744),leaf:mk(PAL.grass),leaf2:mk(PAL.darkG),
  grass:mk(0x6FBF73,{roughness:.95}),ground:mk(0x9BB07A,{roughness:1}),
  water:mk(0x3FA9C9,{roughness:.2,metalness:.3,transparent:true,opacity:.85}),
  red:mk(0xC0392B),blue:mk(0x2C5F8F),purple:mk(0x6A4C93),orange:mk(0xD35400),
  skin1:mk(0xC8926B,{roughness:.7}),skin2:mk(0xA0704B,{roughness:.7}),skin3:mk(0xDEB896,{roughness:.7}),skin4:mk(0x8A5A3B,{roughness:.7}),
  hair1:mk(0x2A1A12,{roughness:.95}),hair2:mk(0x5C3A1E,{roughness:.95}),hair3:mk(0x1A1A1A,{roughness:.95}),hair4:mk(0x6b6b6b,{roughness:.95}),
};

const box=(w,h,d,m)=>new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
const cyl=(r,h,m,s=16)=>new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),m);
const shad=g=>g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
const P=(m,x,y,z)=>{m.position.set(x,y,z);return m;};   // .position is read-only in r160

// ============================================================
// BUILDING DIMENSIONS (expanded)
// ============================================================
const BX0=-15,BX1=15,BZ0=-26,BZ1=15,H=4.0,HI=5.8,T=0.18;
const GX0=-5.5,GX1=5.5,GZ0=-2,GZ1=10;     // bigger central garden
const obstacles=[];
const addObs=(cx,cz,hx,hz)=>obstacles.push({x0:cx-hx,x1:cx+hx,z0:cz-hz,z1:cz+hz});
const linkTargets=[];

// ============================================================
// GROUND & EXTERIOR
// ============================================================
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(160,160),M.ground),0,-0.01,0,-Math.PI/2,true);
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(34,6),M.floorStone),0,0.02,18,-Math.PI/2,true);
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(5,10),M.floorStone),0,0.01,24,-Math.PI/2,true);
function addAtScene(m,x,y,z,rx,recv){m.position.set(x,y,z);if(rx!==undefined)m.rotation.x=rx;if(recv)m.receiveShadow=true;scene.add(m);return m;}

// ============================================================
// FLOORS
// ============================================================
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(BX1-BX0,BZ1-GZ0),M.floor),0,0,(GZ0+BZ1)/2,-Math.PI/2,true);
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(BX1-BX0,GZ0-BZ0),M.floorWood),0,0,(BZ0+GZ0)/2,-Math.PI/2,true);
addAtScene(new THREE.Mesh(new THREE.PlaneGeometry(GX1-GX0+1.4,GZ1-GZ0+1.4),M.floorStone),0,0.01,(GZ0+GZ1)/2,-Math.PI/2,true);

// ============================================================
// WALLS
// ============================================================
function wall(w,h,d,x,y,z,m){const b=box(w,h,d,m);b.position.set(x,y,z);b.castShadow=b.receiveShadow=true;scene.add(b);return b;}
function glassPane(w,h,x,y,z){const g=box(w,h,0.04,M.glassWall);g.position.set(x,y,z);scene.add(g);return g;}
function column(x,z,h=H){const c=cyl(0.16,h,M.concrete);c.position.set(x,h/2,z);shad(c);scene.add(c);addObs(x,z,0.22,0.22);}
function louver(x,z){const g=new THREE.Group();const n=Math.floor(H/0.24);for(let i=0;i<n;i++){const s=box(0.13,0.06,0.13,M.wood);s.position.y=0.2+i*0.24;g.add(s);}g.position.set(x,0,z);shad(g);scene.add(g);}

wall(BX1-BX0,HI,T,0,HI/2,BZ0,M.wall);                 // north (council back)
for(let x=BX0+2.2;x<=BX1-2.2;x+=3.8)if(Math.abs(x)>3.5)column(x,BZ1);    // open south entrance (clear center)
wall(3.4,1,T,BX0+1.6,0.5,BZ1,M.wallAcc);wall(3.4,1,T,BX1-1.6,0.5,BZ1,M.wallAcc);
// east & west with glass bands + louvers
[BX0,BX1].forEach(bx=>{
  wall(T,1.0,BZ1-BZ0,bx,0.5,(BZ0+BZ1)/2,M.wall);
  wall(T,0.6,BZ1-BZ0,bx,H-0.3,(BZ0+BZ1)/2,M.wall);
  glassPane(0.04,H-1.6,bx,1.0+(H-1.6)/2,(BZ0+BZ1)/2);
  for(let z=BZ0+2.5;z<BZ1;z+=3.2)louver(bx+(bx<0?-0.16:0.16),z);
});
// interior glass partition between garden hall and council (z=GZ0), central doorway gap x[-1.8,1.8]
const gpHalfW=(BX1-1.8-1)/2;
glassPane(gpHalfW,H-0.5,(1.8+1+BX1)/2-0.5,H/2-0.2,GZ0);
glassPane(gpHalfW,H-0.5,-(1.8+1+BX1)/2+0.5,H/2-0.2,GZ0);
wall(3.6,0.35,T,0,H-0.15,GZ0,M.wallAcc);
wall(0.08,H,0.08,1.8,H/2,GZ0,M.teal);wall(0.08,H,0.08,-1.8,H/2,GZ0,M.teal);
addObs((1.8+BX1)/2,GZ0,gpHalfW/2+1,T);addObs(-(1.8+BX1)/2,GZ0,gpHalfW/2+1,T);
// garden low walls + glass (x=GX0, x=GX1)
[GX0,GX1].forEach(gx=>{wall(T,1.2,GZ1-GZ0,gx,0.6,(GZ0+GZ1)/2,M.wallAcc);glassPane(0.04,H-1.5,gx,1.2+(H-1.5)/2,(GZ0+GZ1)/2);});
for(let x=-8;x<=8;x+=4)if(Math.abs(x)>2)column(x,GZ1+2);   // clear central axis into the garden

// ============================================================
// ROOF (open over garden)

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function labelTex(text,color){const c=document.createElement('canvas');c.width=440;c.height=72;const t=c.getContext('2d');
  t.fillStyle='rgba(10,26,31,.85)';roundRect(t,3,3,434,66,15);t.fill();t.strokeStyle=color;t.lineWidth=2;t.stroke();
  let fs=30;t.font=`bold ${fs}px Inter,sans-serif`;while(t.measureText(text).width>410&&fs>15){fs--;t.font=`bold ${fs}px Inter,sans-serif`;}
  t.fillStyle=color;t.textAlign='center';t.textBaseline='middle';t.fillText(text,220,38);
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex;}
function label(texts,x,y,z,color='#1AA3B0',w=2.2){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true,depthWrite:false}));sp.position.set(x,y,z);scene.add(sp);
  reg(l=>{if(sp.material.map)sp.material.map.dispose();sp.material.map=labelTex(tr(texts),color);sp.material.needsUpdate=true;sp.scale.set(w,w*72/440,1);});
  return sp;}
function wrapText(t,ctx,x,y,maxW,lh){const words=t.split(' ');let line='',yy=y;for(const w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,yy);line=w+' ';yy+=lh;}else line=test;}ctx.fillText(line,x,yy);return yy;}
function screenTex(title,lines,accent='#1AA3B0',opts={}){
  const c=document.createElement('canvas');c.width=520;c.height=390;const t=c.getContext('2d');
  t.fillStyle=opts.bg||'#07171c';t.fillRect(0,0,520,390);
  t.fillStyle=accent;t.fillRect(0,0,520,9);
  if(opts.badge){t.fillStyle=accent;t.font='bold 15px Inter,sans-serif';t.textAlign='right';t.fillText(opts.badge,496,32);}
  t.textAlign='left';t.fillStyle=accent;t.font='bold 30px Inter,sans-serif';t.fillText(title,26,54);
  let y=96;t.font='19px Inter,sans-serif';
  lines.forEach(ln=>{
    if(ln.h){t.fillStyle=opts.h||'#EDF7F9';t.font='bold 20px Inter,sans-serif';y=wrapText(ln.h,t,26,y,468,25)+34;t.font='19px Inter,sans-serif';return;}
    const txt=typeof ln==='string'?ln:ln.t;const amt=ln.amt;
    t.fillStyle=ln.c||'#bfe0e6';
    if(amt){t.fillText('• '+txt,26,y);t.fillStyle=accent;t.textAlign='right';t.font='bold 19px Inter,sans-serif';t.fillText(amt,496,y);t.textAlign='left';t.font='19px Inter,sans-serif';y+=33;}
    else y=wrapText((ln.bullet===false?'':'• ')+txt,t,26,y,468,25)+31;
  });
  if(opts.foot){t.fillStyle='#5a7a82';t.font='italic 15px Inter,sans-serif';t.fillText(opts.foot,26,376);}
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex;}

function holoLabelTex(text,color){
  const c=document.createElement('canvas');c.width=560;c.height=68;const t=c.getContext('2d');
  let fs=36;t.font=`bold ${fs}px Inter,sans-serif`;while(t.measureText(text).width>536&&fs>13){fs--;t.font=`bold ${fs}px Inter,sans-serif`;}
  t.textAlign='center';t.textBaseline='middle';
  t.lineWidth=5;t.strokeStyle='rgba(2,16,22,.75)';t.strokeText(text,280,36);
  t.shadowColor=color;t.shadowBlur=16;t.fillStyle=color;t.fillText(text,280,36);t.fillText(text,280,36);
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex;}
function holoLabel(texts,color='#3fefff',w=2.6){

function setLang(l){if(l===lang)return;lang=l;
  document.getElementById('es').classList.toggle('on',l==='es');document.getElementById('en').classList.toggle('on',l==='en');
  i18nReg.forEach(fn=>fn(l));applyHTMLLang();}
document.getElementById('es').addEventListener('click',()=>setLang('es'));
document.getElementById('en').addEventListener('click',()=>setLang('en'));

// ============================================================
// LOOP
// ============================================================
const clock=new THREE.Clock();let mmT=0,lkT=0;
function frame(){requestAnimationFrame(frame);const dt=Math.min(clock.getDelta(),0.05);
  if(mode==='tour'){
    camera.rotation.y=yaw;camera.rotation.x=pitch;
    if(!transitioning){let mF=0,mR=0;
      if(keys['KeyW']||keys['ArrowUp'])mF+=1;if(keys['KeyS']||keys['ArrowDown'])mF-=1;
      if(keys['KeyA']||keys['ArrowLeft'])mR-=1;if(keys['KeyD']||keys['ArrowRight'])mR+=1;
      if(isTouch){mF+=-joyVec.y;mR+=joyVec.x;}
      if(keys['Space'])doJump();
      const speed=3.0*((keys['ShiftLeft']||keys['ShiftRight'])?1.9:1);
      const len=Math.hypot(mF,mR);if(len>1){mF/=len;mR/=len;}
      if(mF||mR){const fx=-Math.sin(yaw),fz=-Math.cos(yaw),rx=Math.cos(yaw),rz=-Math.sin(yaw);
        const nx=pos.x+(fx*mF+rx*mR)*speed*dt,nz=pos.z+(fz*mF+rz*mR)*speed*dt;
        if(!collide(nx,pos.z))pos.x=nx;if(!collide(pos.x,nz))pos.z=nz;}
    }
    // jump physics
    if(!onGround||pos.y>EYE){vy+=GRAV*dt;pos.y+=vy*dt;if(pos.y<=EYE){pos.y=EYE;vy=0;onGround=true;}}
    camera.position.copy(pos);
    let near='';for(const z of ZONES){if(Math.hypot(pos.x-z.x,pos.z-z.z)<z.r){near=tr(z.n);break;}}
    if(near!==curZone){curZone=near;tag.textContent=near?'📍 '+near:'Concejo Municipal de Nosara';}
    lkT+=dt;if(lkT>0.12){lkT=0;checkLook();}
    mmT+=dt;if(mmT>0.25){mmT=0;drawMap();}
  }
  if(mainTree)mainTree.rotation.y=Math.sin(clock.elapsedTime*0.3)*0.012;
  if(holo){holo.rotation.y+=dt*0.35;holo.position.y=1.05+Math.sin(clock.elapsedTime*0.9)*0.03;}
  renderer.render(scene,camera);}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
if(isTouch){document.getElementById('kd').style.display='none';document.getElementById('km').style.display='flex';}
applyHTMLLang();
document.getElementById('loading').style.display='none';
frame();

// ============================================================
// GLB EXPORT (tooling: open with ?export=1, chunks on window)
// ============================================================
if(location.search.includes('export=1')){(async()=>{try{
  const mod=await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/exporters/GLTFExporter.js/+esm');
  // prune what makes no sense in room-scale AR: text sprites, huge ground, exterior landscaping, lights
  const kill=[];const wp3=new THREE.Vector3();
  scene.traverse(o=>{
    if(o.isSprite||o.isLight){kill.push(o);return;}
    if(o.geometry&&o.geometry.parameters&&o.geometry.parameters.width>100){kill.push(o);return;}   // 160m ground
    if(o.parent===scene){o.getWorldPosition(wp3);
      if(Math.abs(wp3.x)>BX1+1.6||wp3.z>BZ1+1.6||wp3.z<BZ0-1.6)kill.push(o);}
  });
  kill.forEach(o=>o.parent&&o.parent.remove(o));
  new mod.GLTFExporter().parse(scene,gltf=>{
    const u8=new Uint8Array(gltf);let bin='';const CH=0x8000;
    for(let i=0;i<u8.length;i+=CH)bin+=String.fromCharCode.apply(null,u8.subarray(i,i+CH));
    const b64=btoa(bin);window.__glb=[];const S=262144;
    for(let i=0;i<b64.length;i+=S)window.__glb.push(b64.slice(i,i+S));
    document.title='GLB_READY_'+window.__glb.length+'_'+u8.length;
  },e=>{document.title='GLB_ERR';console.error(e);},{binary:true});
}catch(e){document.title='GLB_ERR2';console.error(e);}})();}
